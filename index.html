<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-16" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ashish.Portfolio</title>

    <!-- fevicon -->
    <link rel="icon" href="./fevicon/favicon.ico" />

    <!-- font awesome icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
    />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Ubuntu&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap file -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
      crossorigin="anonymous"
    />

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
      crossorigin="anonymous"
    ></script>

    <!-- css file  -->
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- Front Section -->
    <section id="front-section">
      <div class="container-fluid">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark">
          <a class="navbar-brand" href=""
            ><img class="nav-logo" src="./images/logo.png" alt=""
          /></a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarToggler"
            aria-controls="navbarTogglerDemo01"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarToggler">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item"><a class="nav-link active" href="">Home</a></li>
              <li class="nav-item"><a class="nav-link" href="">Porjects</a></li>
              <li class="nav-item"><a class="nav-link" href="">Contact</a></li>
            </ul>
          </div>
        </nav>

        <!-- Title  -->
        <div class="row">
          <div class="col-lg-6">
            <img
              class="profile-image"
              src="./images/Profile image.png"
              alt="Profile-image"
            />
          </div>
          <div class="col-lg-6">
            <div class="right-title">
              <h1 class="profile-title">
                Hello, I'am Ashish
                a Coder and Frontend Web Developer.
              </h1>
            </div>
            <div class="right-shape">
              <img class="shape" src="./images/Shape.png" alt="shapes" />
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- other -->
    <section id="other">
      <div class="row">
        <div class="other-element col-lg-4">
          <i class=" other-icon fa-solid fa-file fa-4x"></i>
          <h3>Resume</h3>
        </div>
        <div class="other-element col-lg-4">
          <i class=" other-icon fa-solid fa-heart fa-4x"></i>
          <h3>Hobbies</h3>
        </div>
        <div class="other-element col-lg-4">
          <i class=" other-icon fa-solid fa-file-lines fa-4x"></i>  
          <h3>Certified</h3>
        </div>
      </div>
    </section>

    <!-- Projects -->
    <section id="project">
      <h2 class="skills">SKILLS</h2>
      <div id="carousel-manual" class="carousel slide" data-bs-ride="false">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img class="project-image" src="./images/cplusplus.png" alt="sporty clone">
          </div>
          <div class="carousel-item">
            <img class="project-image" src="./images/css.png" alt="Calculator">
          </div>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carousel-manual"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carousel-manual"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>
    </section>
  </body>
</html>
